project:
  name: "O-E-S-C-L"
  paper_title: "Comparative Waveform-Level SSFM Evaluation of Probabilistic Shaping in C- and S-Band Coherent Optical Links"

simulation:
  seed: 42
  spans: 6
  span_length_km: 80.0
  baud_rate_gbaud: 64.0
  channel_spacing_ghz: 75.0
  modulation: "16QAM"
  symbols_per_channel_full: 32768
  symbols_per_channel_smoke: 2048
  n_channels_per_band_full: 9
  n_channels_per_band_smoke: 3
  launch_power_dbm_grid: [-2.0, 0.0, 2.0, 4.0, 6.0]
  default_launch_power_dbm: 0.0

day5:
  seed: 2026
  symbols: 32768
  sanity_symbols: 8192
  samples_per_symbol: 2
  rrc_rolloff: 0.20
  rrc_span_symbols: 8
  waveform_spans: [10, 12]
  span_length_km: 80.0
  ssfm_steps_per_span: 8
  dispersion_scale: 0.040
  nonlinear_scale: 0.030
  receiver_cd_compensation: true
  matched_filter: true
  normalize_per_span: true
  gmi_monte_carlo_limit: 30000
  llr_noise_floor: 1.0e-5

day8:
  seed: 8080
  scenarios: ["C", "S"]
  spans_grid: [10, 12]
  launch_power_grid: [-2.0, 0.0, 2.0, 4.0]
  pcs_nu_grid: [0.00, 0.36]
  seeds: [1, 2, 3, 4, 5, 6, 7]
  symbols: 32768
  stress:
    name: "day11_external_validation"
    noise: 0.055
    nonlinear: 2.80
    implementation: 0.0080
    phase: 0.026
  min_gmi_gain: 0.015
  min_ngmi_gain: 0.003
  min_rate_gain_tbps_per_channel: 0.0010
  max_ber: 0.10
  require_gain_above_combined_ci95: true
  require_non_saturated: true
  target_gmi_min: 2.40
  target_gmi_max: 3.85
  target_ngmi_min: 0.60
  target_ngmi_max: 0.97
  target_ber_min: 1.0e-4
  target_ber_max: 1.0e-1

day11:
  symbols: 32768
  ssfm_steps_per_span: 8
  seeds: [1, 2, 3, 4, 5, 6, 7]
  reference_csv: "validation_data/gnpy_day11_reference.csv"
  reference_template_csv: "validation_data/gnpy_day11_reference_template.csv"
  external_rmse_pass_db: 1.50
  external_max_abs_pass_db: 2.50
  cases:
    - {scenario_group: "C", band: "C", spans: 10, launch_power_dbm: -2.0}
    - {scenario_group: "C", band: "C", spans: 10, launch_power_dbm: 0.0}
    - {scenario_group: "C", band: "C", spans: 10, launch_power_dbm: 2.0}
    - {scenario_group: "C", band: "C", spans: 10, launch_power_dbm: 4.0}
    - {scenario_group: "S", band: "S", spans: 12, launch_power_dbm: -2.0}
    - {scenario_group: "S", band: "S", spans: 12, launch_power_dbm: 0.0}
    - {scenario_group: "S", band: "S", spans: 12, launch_power_dbm: 2.0}
    - {scenario_group: "S", band: "S", spans: 12, launch_power_dbm: 4.0}

bands:
  S: {center_nm: 1490.0, bandwidth_thz: 10.0, attenuation_db_per_km: 0.22, dispersion_ps_nm_km: 8.0, noise_figure_db: 5.5}
  C: {center_nm: 1550.0, bandwidth_thz: 12.0, attenuation_db_per_km: 0.19, dispersion_ps_nm_km: 16.7, noise_figure_db: 5.0}
  O: {center_nm: 1310.0, bandwidth_thz: 10.0, attenuation_db_per_km: 0.32, dispersion_ps_nm_km: 0.0, noise_figure_db: 6.0}
  E: {center_nm: 1400.0, bandwidth_thz: 8.0, attenuation_db_per_km: 0.28, dispersion_ps_nm_km: 2.0, noise_figure_db: 5.8}
  L: {center_nm: 1605.0, bandwidth_thz: 12.0, attenuation_db_per_km: 0.21, dispersion_ps_nm_km: 20.0, noise_figure_db: 5.3}

fiber:
  gamma_w_inv_km: 1.25
  nonlinear_eta_base: 1.15e-3
  polarization_modes: 2
  implementation_margin_db: 1.0

pcs:
  enabled: true
  shaping_nu: 0.36
  entropy_bits_per_symbol: 3.65

neural_nli:
  enabled: false
  hidden_layer_sizes: [32, 16]
  max_iter_full: 120
  max_iter_smoke: 60
  max_iter_day2: 100
  alpha: 0.0001
  training_fraction: 0.55
  random_state: 42

validation:
  max_reasonable_total_rate_tbps: 250.0
  min_valid_ngmi: 0.45
  max_valid_ber: 0.30
  require_finite_metrics: true

output:
  root: "results"
  figures: "results/figures"
  tables: "results/tables"
  reports: "results/reports"
  models: "results/models"
