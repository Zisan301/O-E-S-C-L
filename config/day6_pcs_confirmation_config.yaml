project:
  name: "O-E-S-C-L"
  paper_title: "Confirmed Operating-Region PCS Gain in Waveform-Level Multi-Band O/E/S/C/L Optical-Link Simulation"

simulation:
  seed: 42
  spans: 6
  span_length_km: 80.0
  baud_rate_gbaud: 64.0
  channel_spacing_ghz: 75.0
  modulation: "16QAM"
  symbols_per_channel_full: 12000
  symbols_per_channel_smoke: 1500
  n_channels_per_band_full: 9
  n_channels_per_band_smoke: 3
  launch_power_dbm_grid: [-4.0, -2.0, 0.0, 2.0, 4.0]
  default_launch_power_dbm: 0.0

day5:
  # Day-6 reuses Day-5 waveform/equalizer modules.
  seed: 2026
  symbols: 8192
  sanity_symbols: 2048
  samples_per_symbol: 2
  rrc_rolloff: 0.20
  rrc_span_symbols: 8

  waveform_spans: [10]
  span_length_km: 80.0
  ssfm_steps_per_span: 4
  dispersion_scale: 0.040
  nonlinear_scale: 0.030
  receiver_cd_compensation: true
  matched_filter: true
  normalize_per_span: true

  # Day-6 locks onto Day-5B's strict-gate winning region.
  launch_power_grid: [4.0]
  stress_grid:
    - {name: "evidence", noise: 0.055, nonlinear: 2.80, implementation: 0.0080, phase: 0.026}

  target_gmi_min: 2.60
  target_gmi_max: 3.80
  target_ber_min: 1.0e-4
  target_ber_max: 8.0e-2
  target_ngmi_min: 0.65
  target_ngmi_max: 0.96

  # Memory neural is checked only on selected PCS points to control runtime.
  memory_taps: 7
  memory_hidden_layers: [96, 48]
  memory_max_iter: 180
  training_fraction: 0.60
  neural_alpha: 0.0001
  gmi_monte_carlo_limit: 35000
  llr_noise_floor: 1.0e-5

  min_gmi_gain_vs_best_baseline: 0.015
  min_ngmi_gain_vs_best_baseline: 0.003
  min_rate_gain_tbps_per_channel: 0.0010
  max_allowed_ber: 8.0e-2
  require_nonzero_pcs_win_for_pcs_claim: true

day6:
  seed: 6060

  # Focused confirmation region from Day-5B.
  band: "C"
  spans: 10
  launch_power_dbm: 4.0
  stress:
    name: "evidence"
    noise: 0.055
    nonlinear: 2.80
    implementation: 0.0080
    phase: 0.026

  # More seeds and more symbols than Day-5B.
  seeds: [1, 2, 3, 4, 5, 6, 7]
  symbols: 8192

  # Sweep around Day-5B winner nu=0.24.
  pcs_nu_grid: [0.00, 0.12, 0.16, 0.20, 0.24, 0.28, 0.32, 0.36]

  # Raw PCS is the main claim.
  run_memory_neural_check: true
  memory_neural_nu_subset: [0.00, 0.20, 0.24, 0.28]

  # Strict PCS confirmation gate.
  min_gmi_gain: 0.020
  min_ngmi_gain: 0.005
  min_rate_gain_tbps_per_channel: 0.0020
  max_ber: 0.080
  require_gain_above_combined_ci95: true
  require_non_saturated: true
  target_gmi_min: 2.60
  target_gmi_max: 3.80
  target_ber_min: 1.0e-4
  target_ber_max: 8.0e-2
  target_ngmi_min: 0.65
  target_ngmi_max: 0.96

bands:
  O:
    center_nm: 1310.0
    bandwidth_thz: 10.0
    attenuation_db_per_km: 0.32
    dispersion_ps_nm_km: 0.0
    noise_figure_db: 6.0
  E:
    center_nm: 1400.0
    bandwidth_thz: 8.0
    attenuation_db_per_km: 0.28
    dispersion_ps_nm_km: 2.0
    noise_figure_db: 5.8
  S:
    center_nm: 1490.0
    bandwidth_thz: 10.0
    attenuation_db_per_km: 0.22
    dispersion_ps_nm_km: 8.0
    noise_figure_db: 5.5
  C:
    center_nm: 1550.0
    bandwidth_thz: 12.0
    attenuation_db_per_km: 0.19
    dispersion_ps_nm_km: 16.7
    noise_figure_db: 5.0
  L:
    center_nm: 1605.0
    bandwidth_thz: 12.0
    attenuation_db_per_km: 0.21
    dispersion_ps_nm_km: 20.0
    noise_figure_db: 5.3

fiber:
  gamma_w_inv_km: 1.25
  nonlinear_eta_base: 1.15e-3
  polarization_modes: 2
  implementation_margin_db: 1.0

pcs:
  enabled: true
  shaping_nu: 0.18
  entropy_bits_per_symbol: 3.65

neural_nli:
  enabled: true
  hidden_layer_sizes: [32, 16]
  max_iter_full: 120
  max_iter_smoke: 60
  max_iter_day2: 100
  alpha: 0.0001
  training_fraction: 0.55
  random_state: 42

validation:
  max_reasonable_total_rate_tbps: 250.0
  min_valid_ngmi: 0.45
  max_valid_ber: 0.30
  require_finite_metrics: true

output:
  root: "results"
  figures: "results/figures"
  tables: "results/tables"
  reports: "results/reports"
  models: "results/models"
